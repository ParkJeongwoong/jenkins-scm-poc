apiVersion: batch/v1
kind: Job
metadata:
  name: hello-batch
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: hello-batch
    spec:
      restartPolicy: Never
      containers:
        - name: hello-batch
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - echo "Hello World from Kubernetes Job"; date
